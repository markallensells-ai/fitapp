<body>

<script type="text/babel">
const { useState, useEffect, useRef } = React;

/* ---------- Firebase ---------- */
const firebaseConfig = {
  apiKey: "AIzaSyCD2JZdHehFxaFKrgwnv7-l7q3OgGJgie8",
  authDomain: "fit-mark-aubree-fc6c9.firebaseapp.com",
  projectId: "fit-mark-aubree-fc6c9",
  storageBucket: "fit-mark-aubree-fc6c9.firebasestorage.app",
  messagingSenderId: "386572514220",
  appId: "1:386572514220:web:e68bd7e3c7aafbf060c009"
};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();
const serverTime = () => firebase.firestore.FieldValue.serverTimestamp();

const ALLOWED = ["mark@fit.com", "aubree@fit.com"];

function person(email) {
  const e = (email || "").toLowerCase();
  if (e.startsWith("mark")) return { name: "Mark", key: "mark", color: "#60A5FA" };
  if (e.startsWith("aubree")) return { name: "Aubree", key: "aubree", color: "#E0A458" };
  return { name: e.split("@")[0] || "?", key: "other", color: "#727E90" };
}
function colorFor(key) { return key === "mark" ? "#60A5FA" : key === "aubree" ? "#E0A458" : "#727E90"; }
function nameFor(key) { return key === "mark" ? "Mark" : key === "aubree" ? "Aubree" : "Someone"; }
const todayStr = () => { const d = new Date(); return d.toISOString().slice(0, 10); };
function prettyDate(s) {
  if (!s) return "";
  const d = new Date(s + "T00:00:00");
  const t = new Date(todayStr() + "T00:00:00");
  const diff = Math.round((d - t) / 86400000);
  if (diff === 0) return "Today";
  if (diff === 1) return "Tomorrow";
  if (diff === -1) return "Yesterday";
  return d.toLocaleDateString(undefined, { weekday: "short", month: "short", day: "numeric" });
}
function clockOf(tsObj) {
  if (!tsObj || !tsObj.toDate) return "";
  return tsObj.toDate().toLocaleTimeString(undefined, { hour: "numeric", minute: "2-digit" });
}

/* ---------- Small UI pieces ---------- */
function Avatar({ k, ring }) {
  const c = colorFor(k);
  return (
    <div style={{ background: c + "22", color: c, borderColor: ring ? c : "transparent" }}
      className="w-7 h-7 rounded-full grid place-items-center text-[12px] font-semibold border-2">
      {nameFor(k)[0]}
    </div>
  );
}
function Tag({ k }) {
  const c = colorFor(k);
  if (k === "both") return <span className="text-[11px] font-medium px-2 py-0.5 rounded-full border border-line text-mut">Both</span>;
  return <span style={{ color: c, borderColor: c + "44" }} className="text-[11px] font-medium px-2 py-0.5 rounded-full border">{nameFor(k)}</span>;
}

/* ---------- Login ---------- */
function Login() {
  const [email, setEmail] = useState("");
  const [pw, setPw] = useState("");
  const [mode, setMode] = useState("in"); // in | up
  const [err, setErr] = useState("");
  const [busy, setBusy] = useState(false);

  async function submit() {
    setErr("");
    if (!email || !pw) { setErr("Enter your email and password."); return; }
    if (!ALLOWED.includes(email.trim().toLowerCase())) {
      setErr("This app is private to Mark and Aubree."); return;
    }
    if (mode === "up" && pw.length < 6) { setErr("Pick a password with at least 6 characters."); return; }
    setBusy(true);
    try {
      if (mode === "up") await auth.createUserWithEmailAndPassword(email.trim(), pw);
      else await auth.signInWithEmailAndPassword(email.trim(), pw);
    } catch (e) {
      const c = e.code || "";
      if (c.includes("email-already-in-use")) setErr("Account already exists — switch to Log in.");
      else if (c.includes("wrong-password") || c.includes("invalid-credential")) setErr("Wrong password. Try again.");
      else if (c.includes("user-not-found")) setErr("No account yet — tap Create account.");
      else if (c.includes("too-many-requests")) setErr("Too many tries. Wait a moment.");
      else setErr("Couldn't sign in. Check your details and try again.");
      setBusy(false);
    }
  }

  return (
    <div className="min-h-screen flex flex-col justify-center px-7 max-w-md mx-auto">
      <div className="mb-10">
        <div className="wordmark text-5xl font-semibold">FORGE</div>
        <div className="mt-1 h-px w-12 bg-mark"></div>
        <div className="mt-3 text-mut text-sm">Mark &amp; Aubree · train together</div>
      </div>

      <div className="space-y-3">
        <div className="flex gap-2">
          <button onClick={() => setEmail("mark@fit.com")}
            className="flex-1 py-2 rounded-xl border border-line text-sm font-medium active:bg-panel2">I'm Mark</button>
          <button onClick={() => setEmail("aubree@fit.com")}
            className="flex-1 py-2 rounded-xl border border-line text-sm font-medium active:bg-panel2">I'm Aubree</button>
        </div>
        <input value={email} onChange={e => setEmail(e.target.value)} placeholder="Email" type="email" autoCapitalize="none"
          className="w-full bg-panel border border-line rounded-xl px-4 py-3 outline-none focus:border-mark" />
        <input value={pw} onChange={e => setPw(e.target.value)} placeholder="Password" type="password"
          onKeyDown={e => e.key === "Enter" && submit()}
          className="w-full bg-panel border border-line rounded-xl px-4 py-3 outline-none focus:border-mark" />
        {err && <div className="text-[13px] text-red-400">{err}</div>}
        <button onClick={submit} disabled={busy}
          className="w-full py-3 rounded-xl bg-mark text-ink font-semibold glow disabled:opacity-60">
          {busy ? "…" : mode === "in" ? "Log in" : "Create account"}
        </button>
        <button onClick={() => { setMode(mode === "in" ? "up" : "in"); setErr(""); }}
          className="w-full text-center text-sm text-mut py-1">
          {mode === "in" ? "First time? Create your account" : "Already set up? Log in"}
        </button>
      </div>
    </div>
  );
}

/* ---------- Schedule ---------- */
function Schedule({ me }) {
  const [items, setItems] = useState(null);
  const [open, setOpen] = useState(false);
  const [filter, setFilter] = useState("all");
  const [f, setF] = useState({ date: todayStr(), title: "", forWho: "both", details: "" });

  useEffect(() => db.collection("workouts").orderBy("date").onSnapshot(s =>
    setItems(s.docs.map(d => ({ id: d.id, ...d.data() })))), []);

  async function add() {
    if (!f.title.trim()) return;
    await db.collection("workouts").add({ ...f, title: f.title.trim(), details: f.details.trim(), done: false, doneBy: null, createdBy: me.key, createdAt: serverTime() });
    setF({ date: todayStr(), title: "", forWho: "both", details: "" });
    setOpen(false);
  }
  const toggle = (it) => db.collection("workouts").doc(it.id).update({ done: !it.done, doneBy: !it.done ? me.key : null });
  const del = (id) => db.collection("workouts").doc(id).delete();

  const list = (items || []).filter(it => filter === "all" || it.forWho === filter || it.forWho === "both");
  const groups = {};
  list.forEach(it => { (groups[it.date] = groups[it.date] || []).push(it); });
  const dates = Object.keys(groups).sort();

  return (
    <div className="px-5">
      <SectionHead title="Schedule" sub="Plan your sessions" onAdd={() => setOpen(!open)} open={open} />
      <div className="flex gap-2 mb-4">
        {[["all", "All"], ["mark", "Mark"], ["aubree", "Aubree"]].map(([k, l]) =>
          <button key={k} onClick={() => setFilter(k)}
            className={"px-3 py-1.5 rounded-full text-sm border " + (filter === k ? "border-mark text-mark" : "border-line text-mut")}>{l}</button>)}
      </div>

      {open && (
        <div className="fade-in bg-panel border border-line rounded-2xl p-4 mb-5 space-y-3">
          <input value={f.title} onChange={e => setF({ ...f, title: e.target.value })} placeholder="Workout title (e.g. Push Day)"
            className="w-full bg-panel2 border border-line rounded-xl px-3 py-2.5 outline-none focus:border-mark" />
          <div className="flex gap-2">
            <input type="date" value={f.date} onChange={e => setF({ ...f, date: e.target.value })}
              className="flex-1 bg-panel2 border border-line rounded-xl px-3 py-2.5 outline-none focus:border-mark text-sm" />
            <select value={f.forWho} onChange={e => setF({ ...f, forWho: e.target.value })}
              className="bg-panel2 border border-line rounded-xl px-3 py-2.5 outline-none focus:border-mark text-sm">
              <option value="both">Both</option><option value="mark">Mark</option><option value="aubree">Aubree</option>
            </select>
          </div>
          <textarea value={f.details} onChange={e => setF({ ...f, details: e.target.value })} rows="3" placeholder="Exercises / notes (one per line)"
            className="w-full bg-panel2 border border-line rounded-xl px-3 py-2.5 outline-none focus:border-mark text-sm resize-none" />
          <button onClick={add} className="w-full py-2.5 rounded-xl bg-mark text-ink font-semibold">Add workout</button>
        </div>
      )}

      {items === null && <Loading />}
      {items && dates.length === 0 && <Empty text="No workouts scheduled yet. Tap + to plan your first session." />}

      <div className="space-y-6">
        {dates.map(date => (
          <div key={date}>
            <div className="text-xs uppercase tracking-wider text-mut mb-2">{prettyDate(date)}</div>
            <div className="space-y-2">
              {groups[date].map(it => (
                <div key={it.id} className="fade-in bg-panel border border-line rounded-2xl p-4">
                  <div className="flex items-start gap-3">
                    <button onClick={() => toggle(it)}
                      style={{ borderColor: it.done ? "#60A5FA" : "#1E2530", background: it.done ? "#60A5FA" : "transparent" }}
                      className="mt-0.5 w-5 h-5 rounded-md border-2 grid place-items-center shrink-0">
                      {it.done && <span className="text-ink text-xs font-bold">✓</span>}
                    </button>
                    <div className="flex-1 min-w-0">
                      <div className="flex items-center gap-2">
                        <span className={"font-semibold " + (it.done ? "line-through text-mut" : "")}>{it.title}</span>
                        <Tag k={it.forWho} />
                      </div>
                      {it.details && <div className="text-sm text-mut mt-1 whitespace-pre-line">{it.details}</div>}
                      {it.done && it.doneBy && <div className="text-[11px] mt-1.5" style={{ color: colorFor(it.doneBy) }}>Done by {nameFor(it.doneBy)}</div>}
                    </div>
                    <button onClick={() => del(it.id)} className="text-mut text-lg leading-none px-1">×</button>
                  </div>
                </div>
              ))}
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

/* ---------- Chat ---------- */
function Chat({ me }) {
  const [msgs, setMsgs] = useState(null);
  const [text, setText] = useState("");
  const endRef = useRef(null);

  useEffect(() => db.collection("messages").orderBy("createdAt").onSnapshot(s =>
    setMsgs(s.docs.map(d => ({ id: d.id, ...d.data() })))), []);
  useEffect(() => { if (endRef.current) endRef.current.scrollIntoView({ behavior: "smooth" }); }, [msgs]);

  async function send() {
    const t = text.trim();
    if (!t) return;
    setText("");
    await db.collection("messages").add({ text: t, sender: me.key, createdAt: serverTime() });
  }

  return (
    <div className="flex flex-col" style={{ height: "calc(100vh - 130px)" }}>
      <div className="px-5 pt-1 pb-2"><SectionHead title="Chat" sub="Just you two" /></div>
      <div className="flex-1 overflow-y-auto px-5 space-y-2.5">
        {msgs === null && <Loading />}
        {msgs && msgs.length === 0 && <Empty text="No messages yet. Say something." />}
        {(msgs || []).map(m => {
          const mine = m.sender === me.key;
          const c = colorFor(m.sender);
          return (
            <div key={m.id} className={"flex fade-in " + (mine ? "justify-end" : "justify-start")}>
              <div className="max-w-[78%]">
                <div className={"px-3.5 py-2.5 rounded-2xl text-[15px] leading-snug " + (mine ? "rounded-br-md" : "rounded-bl-md")}
                  style={mine ? { background: c, color: "#080A0E" } : { background: "#141A24", border: "1px solid #1E2530" }}>
                  {m.text}
                </div>
                <div className={"text-[10px] text-mut mt-1 " + (mine ? "text-right" : "text-left")}>{clockOf(m.createdAt)}</div>
              </div>
            </div>
          );
        })}
        <div ref={endRef}></div>
      </div>
      <div className="px-4 pt-2 pb-3 border-t border-line flex gap-2 items-end bg-ink">
        <textarea value={text} onChange={e => setText(e.target.value)} rows="1" placeholder="Message"
          onKeyDown={e => { if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); send(); } }}
          className="flex-1 bg-panel border border-line rounded-2xl px-4 py-2.5 outline-none focus:border-mark resize-none max-h-28" />
        <button onClick={send} style={{ background: me.color }} className="w-11 h-11 rounded-full grid place-items-center text-ink text-lg font-bold shrink-0">↑</button>
      </div>
    </div>
  );
}

/* ---------- Goals ---------- */
function Goals({ me }) {
  const [items, setItems] = useState(null);
  const [open, setOpen] = useState(false);
  const [f, setF] = useState({ title: "", target: "", owner: "shared" });

  useEffect(() => db.collection("goals").orderBy("createdAt", "desc").onSnapshot(s =>
    setItems(s.docs.map(d => ({ id: d.id, ...d.data() })))), []);

  async function add() {
    if (!f.title.trim()) return;
    await db.collection("goals").add({ ...f, title: f.title.trim(), target: f.target.trim(), progress: 0, createdBy: me.key, createdAt: serverTime() });
    setF({ title: "", target: "", owner: "shared" });
    setOpen(false);
  }
  const bump = (it, n) => db.collection("goals").doc(it.id).update({ progress: Math.max(0, Math.min(100, (it.progress || 0) + n)) });
  const del = (id) => db.collection("goals").doc(id).delete();

  return (
    <div className="px-5">
      <SectionHead title="Goals" sub="What you're chasing" onAdd={() => setOpen(!open)} open={open} />
      {open && (
        <div className="fade-in bg-panel border border-line rounded-2xl p-4 mb-5 space-y-3">
          <input value={f.title} onChange={e => setF({ ...f, title: e.target.value })} placeholder="Goal (e.g. Squat 315)"
            className="w-full bg-panel2 border border-line rounded-xl px-3 py-2.5 outline-none focus:border-mark" />
          <input value={f.target} onChange={e => setF({ ...f, target: e.target.value })} placeholder="Target / by when (optional)"
            className="w-full bg-panel2 border border-line rounded-xl px-3 py-2.5 outline-none focus:border-mark text-sm" />
          <select value={f.owner} onChange={e => setF({ ...f, owner: e.target.value })}
            className="w-full bg-panel2 border border-line rounded-xl px-3 py-2.5 outline-none focus:border-mark text-sm">
            <option value="shared">Shared</option><option value="mark">Mark</option><option value="aubree">Aubree</option>
          </select>
          <button onClick={add} className="w-full py-2.5 rounded-xl bg-mark text-ink font-semibold">Add goal</button>
        </div>
      )}
      {items === null && <Loading />}
      {items && items.length === 0 && <Empty text="No goals set yet. Tap + to add one." />}
      <div className="space-y-3">
        {(items || []).map(it => {
          const c = it.owner === "shared" ? "#60A5FA" : colorFor(it.owner);
          const done = (it.progress || 0) >= 100;
          return (
            <div key={it.id} className="fade-in bg-panel border border-line rounded-2xl p-4">
              <div className="flex items-center gap-2">
                <span className={"font-semibold flex-1 " + (done ? "text-mark" : "")}>{it.title}</span>
                {it.owner === "shared"
                  ? <span className="text-[11px] px-2 py-0.5 rounded-full border border-line text-mut">Shared</span>
                  : <Tag k={it.owner} />}
                <button onClick={() => del(it.id)} className="text-mut text-lg leading-none px-1">×</button>
              </div>
              {it.target && <div className="text-sm text-mut mt-0.5">{it.target}</div>}
              <div className="mt-3 h-2 rounded-full bg-panel2 overflow-hidden">
                <div className="h-full rounded-full transition-all" style={{ width: (it.progress || 0) + "%", background: c }}></div>
              </div>
              <div className="flex items-center justify-between mt-2.5">
                <span className="text-sm font-medium" style={{ color: c }}>{it.progress || 0}%{done ? " · done" : ""}</span>
                <div className="flex gap-2">
                  <button onClick={() => bump(it, -10)} className="w-8 h-8 rounded-lg border border-line text-mut">−</button>
                  <button onClick={() => bump(it, 10)} className="w-8 h-8 rounded-lg border border-line text-txt">+</button>
                </div>
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

/* ---------- Food ---------- */
function Food({ me }) {
  const [items, setItems] = useState(null);
  const [open, setOpen] = useState(false);
  const [f, setF] = useState({ date: todayStr(), meal: "Breakfast", name: "", notes: "" });

  useEffect(() => db.collection("meals").orderBy("date", "desc").orderBy("createdAt", "desc").onSnapshot(
    s => setItems(s.docs.map(d => ({ id: d.id, ...d.data() }))),
    () => db.collection("meals").orderBy("createdAt", "desc").onSnapshot(s => setItems(s.docs.map(d => ({ id: d.id, ...d.data() }))))
  ), []);

  async function add() {
    if (!f.name.trim()) return;
    await db.collection("meals").add({ ...f, name: f.name.trim(), notes: f.notes.trim(), loggedBy: me.key, createdAt: serverTime() });
    setF({ date: todayStr(), meal: "Breakfast", name: "", notes: "" });
    setOpen(false);
  }
  const del = (id) => db.collection("meals").doc(id).delete();

  const groups = {};
  (items || []).forEach(it => { (groups[it.date] = groups[it.date] || []).push(it); });
  const dates = Object.keys(groups).sort().reverse();

  return (
    <div className="px-5">
      <SectionHead title="Food" sub="What you ate" onAdd={() => setOpen(!open)} open={open} />
      {open && (
        <div className="fade-in bg-panel border border-line rounded-2xl p-4 mb-5 space-y-3">
          <input value={f.name} onChange={e => setF({ ...f, name: e.target.value })} placeholder="What did you eat?"
            className="w-full bg-panel2 border border-line rounded-xl px-3 py-2.5 outline-none focus:border-mark" />
          <div className="flex gap-2">
            <input type="date" value={f.date} onChange={e => setF({ ...f, date: e.target.value })}
              className="flex-1 bg-panel2 border border-line rounded-xl px-3 py-2.5 outline-none focus:border-mark text-sm" />
            <select value={f.meal} onChange={e => setF({ ...f, meal: e.target.value })}
              className="bg-panel2 border border-line rounded-xl px-3 py-2.5 outline-none focus:border-mark text-sm">
              {["Breakfast", "Lunch", "Dinner", "Snack"].map(m => <option key={m}>{m}</option>)}
            </select>
          </div>
          <input value={f.notes} onChange={e => setF({ ...f, notes: e.target.value })} placeholder="Notes (optional)"
            className="w-full bg-panel2 border border-line rounded-xl px-3 py-2.5 outline-none focus:border-mark text-sm" />
          <button onClick={add} className="w-full py-2.5 rounded-xl bg-mark text-ink font-semibold">Log it</button>
        </div>
      )}
      {items === null && <Loading />}
      {items && dates.length === 0 && <Empty text="Nothing logged yet. Tap + to add a meal." />}
      <div className="space-y-6">
        {dates.map(date => (
          <div key={date}>
            <div className="text-xs uppercase tracking-wider text-mut mb-2">{prettyDate(date)}</div>
            <div className="space-y-2">
              {groups[date].map(it => (
                <div key={it.id} className="fade-in bg-panel border border-line rounded-2xl p-4 flex items-start gap-3">
                  <div className="flex-1 min-w-0">
                    <div className="flex items-center gap-2">
                      <span className="font-semibold">{it.name}</span>
                      <span className="text-[11px] px-2 py-0.5 rounded-full border border-line text-mut">{it.meal}</span>
                    </div>
                    {it.notes && <div className="text-sm text-mut mt-1">{it.notes}</div>}
                    <div className="text-[11px] mt-1.5" style={{ color: colorFor(it.loggedBy) }}>Logged by {nameFor(it.loggedBy)}</div>
                  </div>
                  <button onClick={() => del(it.id)} className="text-mut text-lg leading-none px-1">×</button>
                </div>
              ))}
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

/* ---------- Shared bits ---------- */
function SectionHead({ title, sub, onAdd, open }) {
  return (
    <div className="flex items-end justify-between mb-4">
      <div>
        <h1 className="wordmark text-3xl font-semibold leading-none">{title}</h1>
        {sub && <div className="text-mut text-sm mt-1">{sub}</div>}
      </div>
      {onAdd && (
        <button onClick={onAdd} style={{ background: open ? "transparent" : "#60A5FA", color: open ? "#727E90" : "#080A0E" }}
          className={"w-9 h-9 rounded-full grid place-items-center text-xl font-bold " + (open ? "border border-line" : "glow")}>
          {open ? "×" : "+"}
        </button>
      )}
    </div>
  );
}
function Loading() { return <div className="text-center text-mut text-sm py-10">Loading…</div>; }
function Empty({ text }) { return <div className="text-center text-mut text-sm py-12 px-6 leading-relaxed">{text}</div>; }

/* ---------- Shell ---------- */
const TABS = [
  { k: "schedule", label: "Schedule", icon: "▦" },
  { k: "chat", label: "Chat", icon: "✦" },
  { k: "goals", label: "Goals", icon: "◎" },
  { k: "food", label: "Food", icon: "❍" },
];

function Shell({ user }) {
  const me = person(user.email);
  const [tab, setTab] = useState("schedule");
  const other = me.key === "mark" ? "aubree" : "mark";

  return (
    <div className="max-w-md mx-auto min-h-screen flex flex-col">
      <header className="top-pad px-5 pt-3 pb-3 flex items-center justify-between sticky top-0 z-20 bg-ink/90 backdrop-blur border-b border-line">
        <div className="flex items-center gap-2.5">
          <div className="flex -space-x-2">
            <Avatar k={me.key} ring />
            <Avatar k={other} />
          </div>
          <div className="leading-tight">
            <div className="wordmark text-lg font-semibold">FORGE</div>
            <div className="flex items-center gap-1.5 text-[11px] text-mut">
              <span className="w-1.5 h-1.5 rounded-full bg-emerald-400 pulse-dot"></span> Live · {me.name}
            </div>
          </div>
        </div>
        <button onClick={() => auth.signOut()} className="text-xs text-mut border border-line rounded-lg px-3 py-1.5">Log out</button>
      </header>

      <main className="flex-1 pt-4 nav-pad">
        {tab === "schedule" && <Schedule me={me} />}
        {tab === "chat" && <Chat me={me} />}
        {tab === "goals" && <Goals me={me} />}
        {tab === "food" && <Food me={me} />}
      </main>

      <nav className="fixed bottom-0 left-0 right-0 z-20 safe-bottom border-t border-line bg-ink/95 backdrop-blur">
        <div className="max-w-md mx-auto flex">
          {TABS.map(t => {
            const on = tab === t.k;
            return (
              <button key={t.k} onClick={() => setTab(t.k)} className="flex-1 py-3 flex flex-col items-center gap-1">
                <span className="text-lg leading-none" style={{ color: on ? me.color : "#727E90" }}>{t.icon}</span>
                <span className="text-[10px] font-medium" style={{ color: on ? me.color : "#727E90" }}>{t.label}</span>
              </button>
            );
          })}
        </div>
      </nav>
    </div>
  );
}

/* ---------- Root ---------- */
function App() {
  const [user, setUser] = useState(undefined);
  useEffect(() => auth.onAuthStateChanged(u => setUser(u)), []);
  if (user === undefined) return <div className="min-h-screen grid place-items-center text-mut">Loading…</div>;
  if (!user) return <Login />;
  return <Shell user={user} />;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
