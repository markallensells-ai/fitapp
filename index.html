<!-- On-screen error reporter: turns silent failures into a visible message -->
<script>
  window.__bootErr = function (m) {
    var d = document.getElementById('boot-error');
    if (!d) {
      d = document.createElement('div'); d.id = 'boot-error';
      d.style.cssText = 'position:fixed;inset:0;z-index:99999;background:#080A0E;color:#F87171;font:13px/1.6 ui-monospace,monospace;padding:22px;overflow:auto;white-space:pre-wrap;';
      (document.body || document.documentElement).appendChild(d);
    }
    d.textContent += m + "\n\n";
  };
  window.addEventListener('error', function (e) {
    if (e.target && e.target.tagName === 'SCRIPT') { window.__bootErr('FAILED TO LOAD SCRIPT:\n  ' + e.target.src); return; }
    if (e.target && e.target.tagName === 'LINK') { window.__bootErr('FAILED TO LOAD:\n  ' + e.target.href); return; }
    window.__bootErr('ERROR: ' + (e.message || 'unknown') + (e.filename ? '\n  at ' + e.filename + ':' + (e.lineno || '') : ''));
  }, true);
  window.addEventListener('unhandledrejection', function (e) {
    var r = e.reason || {}; window.__bootErr('PROMISE ERROR: ' + (r.code || r.message || r));
  });
</script>

const todayStr = () => { const d = new Date(); return d.toISOString().slice(0, 10); };
function prettyDate(s) {
  if (!s) return "";
  const d = new Date(s + "T00:00:00");
  const t = new Date(todayStr() + "T00:00:00");
  const diff = Math.round((d - t) / 86400000);
  if (diff === 0) return "Today";
  if (diff === 1) return "Tomorrow";
  if (diff === -1) return "Yesterday";
  return d.toLocaleDateString(undefined, { weekday: "short", month: "short", day: "numeric" });
}
function clockOf(tsObj) {
  if (!tsObj || !tsObj.toDate) return "";

/* ---------- Login ---------- */
function Login() {
  const [email, setEmail] = useState("");
  const [pw, setPw] = useState("");
  const [mode, setMode] = useState("in"); // in | up
  const [err, setErr] = useState("");
  const [busy, setBusy] = useState(false);

  async function submit() {
    setErr("");
    if (!email || !pw) { setErr("Enter your email and password."); return; }
    if (!ALLOWED.includes(email.trim().toLowerCase())) {
      setErr("This app is private to Mark and Aubree."); return;
    }
    if (mode === "up" && pw.length < 6) { setErr("Pick a password with at least 6 characters."); return; }
    setBusy(true);
    try {
      if (mode === "up") await auth.createUserWithEmailAndPassword(email.trim(), pw);
      else await auth.signInWithEmailAndPassword(email.trim(), pw);
    } catch (e) {
      const c = e.code || "";
      if (c.includes("email-already-in-use")) setErr("Account already exists — switch to Log in.");
      else if (c.includes("wrong-password") || c.includes("invalid-credential")) setErr("Wrong password. Try again.");
      else if (c.includes("user-not-found")) setErr("No account yet — tap Create account.");
      else if (c.includes("too-many-requests")) setErr("Too many tries. Wait a moment.");
      else setErr("Couldn't sign in. Check your details and try again.");
      setBusy(false);
    }
  }

  return (
    <div className="min-h-screen flex flex-col justify-center px-7 max-w-md mx-auto">
      <div className="mb-10">
        <div className="wordmark text-5xl font-semibold">FORGE</div>

        <div className="mt-3 text-mut text-sm">Mark &amp; Aubree · train together</div>

        <div className="flex gap-2">
          <button onClick={() => setEmail("mark@fit.com")}
            className="flex-1 py-2 rounded-xl border border-line text-sm font-medium active:bg-panel2">I'm Mark</button>
          <button onClick={() => setEmail("aubree@fit.com")}
            className="flex-1 py-2 rounded-xl border border-line text-sm font-medium active:bg-panel2">I'm Aubree</button>
        </div>
        <input value={email} onChange={e => setEmail(e.target.value)} placeholder="Email" type="email" autoCapitalize="none"
          className="w-full bg-panel border border-line rounded-xl px-4 py-3 outline-none focus:border-mark" />
        <input value={pw} onChange={e => setPw(e.target.value)} placeholder="Password" type="password"
          onKeyDown={e => e.key === "Enter" && submit()}
          className="w-full bg-panel border border-line rounded-xl px-4 py-3 outline-none focus:border-mark" />
        {err && <div className="text-[13px] text-red-400">{err}</div>}
        <button onClick={submit} disabled={busy}
          className="w-full py-3 rounded-xl bg-mark text-ink font-semibold glow disabled:opacity-60">
          {busy ? "…" : mode === "in" ? "Log in" : "Create account"}
        </button>
        <button onClick={() => { setMode(mode === "in" ? "up" : "in"); setErr(""); }}
          className="w-full text-center text-sm text-mut py-1">
          {mode === "in" ? "First time? Create your account" : "Already set up? Log in"}
        </button>
      </div>
    </div>
  );
}

const BLANK_W = () => ({ date: todayStr(), title: "", forWho: "both", ex: [], notes: "" });

function isoOf(d) { return d.toISOString().slice(0, 10); }
function weekCount(items, key) {
  const today = new Date(todayStr() + "T00:00:00");
  const start = new Date(today); start.setDate(today.getDate() - 6);
  const lo = isoOf(start), hi = isoOf(today);
  return items.filter(it => it.done && it.doneBy === key && it.date >= lo && it.date <= hi).length;
}
function streakFor(items, key) {
  const days = new Set(items.filter(it => it.done && it.doneBy === key).map(it => it.date));
  let d = new Date(todayStr() + "T00:00:00");
  if (!days.has(isoOf(d))) d.setDate(d.getDate() - 1);
  let n = 0;
  while (days.has(isoOf(d))) { n++; d.setDate(d.getDate() - 1); }
  return n;
}

/* ---------- Workout Mode ---------- */
function WorkoutMode({ workout, me, onClose }) {
  const exs = Array.isArray(workout.exercises) ? workout.exercises : [];
  const [done, setDone] = useState({});
  const [rest, setRest] = useState(90);
  const [left, setLeft] = useState(0);
  const [running, setRunning] = useState(false);
  const tRef = useRef(null);

  useEffect(() => {
    if (running && left > 0) tRef.current = setTimeout(() => setLeft(left - 1), 1000);
    else if (running && left === 0) { setRunning(false); beep(); }
    return () => clearTimeout(tRef.current);
  }, [running, left]);

  function beep() {
    try {
      const ctx = new (window.AudioContext || window.webkitAudioContext)();
      const o = ctx.createOscillator(), g = ctx.createGain();
      o.connect(g); g.connect(ctx.destination);
      o.type = "sine"; o.frequency.value = 880;
      g.gain.setValueAtTime(0.15, ctx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + 0.4);
      o.start(); o.stop(ctx.currentTime + 0.42);
    } catch (e) {}
    if (navigator.vibrate) navigator.vibrate(180);
  }
  function toggleSet(i, s) {
    const k = i + "-" + s;
    const on = !done[k];
    setDone(prev => ({ ...prev, [k]: on }));
    if (on) { setLeft(rest); setRunning(true); }
  }
  async function finish() {
    await db.collection("workouts").doc(workout.id).update({ done: true, doneBy: me.key });
    onClose();
  }
  const totalSets = exs.reduce((a, e) => a + (Number(e.sets) || 0), 0);
  const doneCount = Object.values(done).filter(Boolean).length;
  const fmt = s => Math.floor(s / 60) + ":" + String(s % 60).padStart(2, "0");

  return (
    <div className="fixed inset-0 z-50 bg-ink overflow-y-auto">
      <div className="max-w-md mx-auto min-h-full pb-44">
        <div className="top-pad sticky top-0 z-10 bg-ink/95 backdrop-blur border-b border-line px-5 py-3 flex items-center justify-between">
          <button onClick={onClose} className="text-mut text-2xl leading-none w-10 text-left">×</button>
          <div className="text-center">
            <div className="font-semibold leading-tight">{workout.title}</div>
            <div className="text-[11px] text-mut">{doneCount}/{totalSets} sets done</div>
          </div>
          <button onClick={finish} className="text-mark font-semibold w-14 text-right">Finish</button>
        </div>

        <div className="px-5 py-4 space-y-3">
          {exs.length === 0 && <Empty text="This workout has no exercises yet. Add some from the Schedule." />}
          {exs.map((e, i) => (
            <div key={i} className="bg-panel border border-line rounded-2xl p-4">
              <div className="flex items-baseline justify-between">
                <span className="font-semibold">{e.name}</span>
                <span className="text-xs text-mut">{e.sets}×{e.reps}{e.weight ? " · " + e.weight : ""}</span>
              </div>
              <div className="flex flex-wrap gap-2 mt-3">
                {Array.from({ length: Number(e.sets) || 0 }).map((_, s) => {
                  const on = !!done[i + "-" + s];
                  return (
                    <button key={s} onClick={() => toggleSet(i, s)}
                      style={{ borderColor: on ? "#60A5FA" : "#1E2530", background: on ? "#60A5FA" : "transparent", color: on ? "#080A0E" : "#F4F6FA" }}
                      className="w-11 h-11 rounded-xl border-2 font-semibold text-sm">{s + 1}</button>
                  );
                })}
              </div>
            </div>
          ))}
        </div>
      </div>

      <div className="fixed bottom-0 left-0 right-0 z-20 safe-bottom border-t border-line bg-ink/95 backdrop-blur">
        <div className="max-w-md mx-auto px-5 py-3">
          <div className="flex items-center justify-between mb-2">
            <div>
              <div className="text-[11px] uppercase tracking-wider text-mut">Rest timer</div>
              <div className="text-3xl font-semibold tabular-nums" style={{ color: running ? "#60A5FA" : "#F4F6FA" }}>{fmt(left)}</div>
            </div>
            <div className="flex gap-2">
              <button onClick={() => setLeft(left + 15)} className="px-3 py-2 rounded-lg border border-line text-sm">+15s</button>
              <button onClick={() => { if (left === 0) setLeft(rest); setRunning(!running); }}
                className="px-4 py-2 rounded-lg border border-mark text-mark text-sm font-semibold">{running ? "Pause" : "Start"}</button>
            </div>
          </div>
          <div className="flex gap-2">
            {[60, 90, 120].map(r => (
              <button key={r} onClick={() => { setRest(r); setLeft(r); setRunning(true); }}

            ))}
          </div>
        </div>
      </div>
    </div>
  );
}

  const [active, setActive] = useState(null);
  const [routines, setRoutines] = useState([]);
  const [saved, setSaved] = useState(false);

  useEffect(() => db.collection("workouts").orderBy("date").onSnapshot(
    s => setItems(s.docs.map(d => ({ id: d.id, ...d.data() }))),
    () => setItems("error")
  ), []);
  useEffect(() => db.collection("routines").orderBy("createdAt").onSnapshot(
    s => setRoutines(s.docs.map(d => ({ id: d.id, ...d.data() }))),
    () => {}
  ), []);

  function loadRoutine(r) {
    setF(prev => ({ ...prev, title: r.name, ex: r.ex.map(a => ({ name: a[0], sets: a[1], reps: a[2], weight: "" })) }));
  }
  function loadCustom(r) {
    setF(prev => ({ ...prev, title: r.name, ex: (r.ex || []).map(a => ({ name: a.name, sets: a.sets, reps: a.reps, weight: "" })) }));
  }
  async function saveTemplate() {
    const title = f.title.trim();
    if (!title || f.ex.length === 0) return;
    await db.collection("routines").add({
      name: title,
      ex: f.ex.map(e => ({ name: e.name, sets: Number(e.sets) || 0, reps: Number(e.reps) || 0 })),
      createdBy: me.key, createdAt: serverTime()
    });
    setSaved(true); setTimeout(() => setSaved(false), 1500);
  }
  const delTemplate = (id) => db.collection("routines").doc(id).delete();
  const addEx = (name) => setF(prev => ({ ...prev, ex: [...prev.ex, { name, sets: 3, reps: 10, weight: "" }] }));
  const removeExByName = (name) => setF(prev => ({ ...prev, ex: prev.ex.filter(e => e.name !== name) }));
  const removeEx = (i) => setF(prev => ({ ...prev, ex: prev.ex.filter((_, idx) => idx !== i) }));
  const updateEx = (i, field, val) => setF(prev => ({ ...prev, ex: prev.ex.map((e, idx) => idx === i ? { ...e, [field]: val } : e) }));

  async function save() {
    let title = f.title.trim();
    if (!title && f.ex.length === 0) return;
    if (!title) title = "Workout";
    await db.collection("workouts").add({
      date: f.date, title, forWho: f.forWho,
      exercises: f.ex.map(e => ({ name: e.name, sets: Number(e.sets) || 0, reps: Number(e.reps) || 0, weight: (e.weight || "").toString().trim() })),
      notes: f.notes.trim(), done: false, doneBy: null, createdBy: me.key, createdAt: serverTime()
    });
    setF(BLANK_W()); setPicker(false); setOpen(false);
  }
  const toggle = (it) => db.collection("workouts").doc(it.id).update({ done: !it.done, doneBy: !it.done ? me.key : null });
  const del = (id) => db.collection("workouts").doc(id).delete();

  const arr = Array.isArray(items) ? items : [];
  const list = arr.filter(it => filter === "all" || it.forWho === filter || it.forWho === "both");
  const groups = {};
  list.forEach(it => { (groups[it.date] = groups[it.date] || []).push(it); });
  const dates = Object.keys(groups).sort();

  return (
    <div className="px-5">
      <SectionHead title="Schedule" sub="Plan your sessions" onAdd={() => { setF(BLANK_W()); setOpen(true); }} open={false} />

      {Array.isArray(items) && (
        <div className="bg-panel border border-line rounded-2xl p-4 mb-4">
          <div className="text-xs uppercase tracking-wider text-mut mb-3">This week</div>
          {["mark", "aubree"].map(k => {
            const c = colorFor(k), wc = weekCount(arr, k), st = streakFor(arr, k);
            return (
              <div key={k} className="mb-3 last:mb-0">
                <div className="flex items-center justify-between mb-1.5">
                  <div className="flex items-center gap-2"><Avatar k={k} /><span className="text-sm font-medium">{nameFor(k)}</span></div>
                  <div className="text-xs text-mut">{wc}/6 · {st > 0 ? st + " day streak" : "no streak"}</div>
                </div>
                <div className="h-2 rounded-full bg-panel2 overflow-hidden">
                  <div className="h-full rounded-full" style={{ width: Math.min(wc / 6, 1) * 100 + "%", background: c }}></div>
                </div>
              </div>
            );
          })}
        </div>
      )}

      <div className="flex gap-2 mb-4">
        {[["all", "All"], ["mark", "Mark"], ["aubree", "Aubree"]].map(([k, l]) =>
          <button key={k} onClick={() => setFilter(k)}
            className={"px-3 py-1.5 rounded-full text-sm border " + (filter === k ? "border-mark text-mark" : "border-line text-mut")}>{l}</button>)}
      </div>

      {items === null && <Loading />}
      {items === "error" && <Empty text="Can't reach the database. Publish the Firestore security rules, then refresh." />}
      {Array.isArray(items) && dates.length === 0 && <Empty text="No workouts scheduled yet. Tap + to plan your first session." />}

      <div className="space-y-6">
        {dates.map(date => (
          <div key={date}>
            <div className="text-xs uppercase tracking-wider text-mut mb-2">{prettyDate(date)}</div>
            <div className="space-y-2">
              {groups[date].map(it => (
                <div key={it.id} className="fade-in bg-panel border border-line rounded-2xl p-4">
                  <div className="flex items-start gap-3">
                    <button onClick={() => toggle(it)}
                      style={{ borderColor: it.done ? "#60A5FA" : "#1E2530", background: it.done ? "#60A5FA" : "transparent" }}
                      className="mt-0.5 w-5 h-5 rounded-md border-2 grid place-items-center shrink-0">
                      {it.done && <span className="text-ink text-xs font-bold">✓</span>}
                    </button>
                    <div className="flex-1 min-w-0">
                      <div className="flex items-center gap-2">
                        <span className={"font-semibold " + (it.done ? "line-through text-mut" : "")}>{it.title}</span>
                        <Tag k={it.forWho} />
                      </div>
                      {Array.isArray(it.exercises) && it.exercises.length > 0 && (
                        <div className="mt-2 space-y-1">
                          {it.exercises.map((e, i) => (
                            <div key={i} className="flex items-baseline gap-2 text-[13px]">
                              <span>{e.name}</span>
                              <span className="text-mut">{e.sets}×{e.reps}{e.weight ? " · " + e.weight : ""}</span>
                            </div>
                          ))}
                        </div>
                      )}
                      {it.details && <div className="text-sm text-mut mt-1 whitespace-pre-line">{it.details}</div>}
                      {it.notes && <div className="text-xs text-mut mt-2">{it.notes}</div>}
                      {it.done && it.doneBy && <div className="text-[11px] mt-1.5" style={{ color: colorFor(it.doneBy) }}>Done by {nameFor(it.doneBy)}</div>}
                      {Array.isArray(it.exercises) && it.exercises.length > 0 && (
                        <button onClick={() => setActive(it)}
                          className="mt-3 w-full py-2 rounded-xl border border-mark text-mark text-sm font-semibold">
                          {it.done ? "Start again" : "Start workout"}
                        </button>
                      )}
                    </div>
                    <button onClick={() => del(it.id)} className="text-mut text-lg leading-none px-1">×</button>
                  </div>
                </div>
              ))}
            </div>
          </div>
        ))}
      </div>

      {open && (
        <div className="fixed inset-0 z-40 bg-ink overflow-y-auto">
          <div className="max-w-md mx-auto min-h-full">
            <div className="top-pad sticky top-0 z-10 bg-ink/95 backdrop-blur border-b border-line px-5 py-3 flex items-center justify-between">
              <button onClick={() => { setOpen(false); setPicker(false); }} className="text-mut text-2xl leading-none w-10 text-left">×</button>
              <span className="font-semibold">New workout</span>
              <button onClick={save} className="text-mark font-semibold w-12 text-right">Save</button>
            </div>
            <div className="px-5 py-4 space-y-5 pb-24">
              <input value={f.title} onChange={e => setF({ ...f, title: e.target.value })} placeholder="Workout title (e.g. Push Day)"
                className="w-full text-lg bg-transparent border-b border-line py-2 outline-none focus:border-mark" />
              <div className="flex gap-2">
                <input type="date" value={f.date} onChange={e => setF({ ...f, date: e.target.value })}
                  className="flex-1 bg-panel border border-line rounded-xl px-3 py-2.5 text-sm outline-none focus:border-mark" />
                <select value={f.forWho} onChange={e => setF({ ...f, forWho: e.target.value })}
                  className="bg-panel border border-line rounded-xl px-3 py-2.5 text-sm outline-none focus:border-mark">
                  <option value="both">Both</option><option value="mark">Mark</option><option value="aubree">Aubree</option>
                </select>
              </div>

              <div>
                <div className="flex items-center justify-between mb-2">
                  <div className="text-xs uppercase tracking-wider text-mut">Quick start</div>
                  <button onClick={saveTemplate} disabled={!f.title.trim() || f.ex.length === 0}
                    className="text-mark text-xs font-medium disabled:opacity-40">{saved ? "Saved ✓" : "Save as template"}</button>
                </div>
                <div className="flex gap-2 overflow-x-auto pb-1 -mx-5 px-5">
                  {ROUTINES.map(r => (
                    <button key={r.name} onClick={() => loadRoutine(r)}
                      className="shrink-0 px-3.5 py-2 rounded-xl border border-line text-sm active:border-mark">{r.name}</button>
                  ))}
                  {routines.map(r => (
                    <div key={r.id} className="shrink-0 relative">
                      <button onClick={() => loadCustom(r)}
                        style={{ borderColor: "rgba(96,165,250,0.5)" }}
                        className="px-3.5 py-2 pr-7 rounded-xl border text-sm text-mark">{r.name}</button>
                      <button onClick={() => delTemplate(r.id)}
                        className="absolute top-1/2 -translate-y-1/2 right-1.5 text-mut text-xs leading-none px-1">×</button>
                    </div>
                  ))}
                </div>
              </div>

              <div>
                <div className="flex items-center justify-between mb-2">
                  <div className="text-xs uppercase tracking-wider text-mut">Exercises</div>
                  <button onClick={() => setPicker(true)} className="text-mark text-sm font-medium">+ Add exercise</button>
                </div>
                {f.ex.length === 0 && <div className="text-sm text-mut py-3">Pick a routine above, or add exercises from the library.</div>}
                <div className="space-y-2">
                  {f.ex.map((e, i) => (
                    <div key={i} className="bg-panel border border-line rounded-xl p-3">
                      <div className="flex items-center justify-between">
                        <span className="font-medium text-sm">{e.name}</span>
                        <button onClick={() => removeEx(i)} className="text-mut text-lg leading-none px-1">×</button>
                      </div>
                      <div className="flex gap-2 mt-2">
                        <NumField label="Sets" value={e.sets} onChange={v => updateEx(i, "sets", v)} />
                        <NumField label="Reps" value={e.reps} onChange={v => updateEx(i, "reps", v)} />
                        <NumField label="Weight" value={e.weight} onChange={v => updateEx(i, "weight", v)} ph="lb" />
                      </div>
                    </div>
                  ))}
                </div>
              </div>

              <textarea value={f.notes} onChange={e => setF({ ...f, notes: e.target.value })} rows="2" placeholder="Notes (optional)"
                className="w-full bg-panel border border-line rounded-xl px-3 py-2.5 text-sm outline-none focus:border-mark resize-none" />
            </div>
          </div>

          {picker && (
            <div className="fixed inset-0 z-50 bg-ink overflow-y-auto">
              <div className="max-w-md mx-auto min-h-full">
                <div className="top-pad sticky top-0 z-10 bg-ink/95 backdrop-blur border-b border-line px-5 py-3 flex items-center justify-between">
                  <span className="font-semibold">Add exercises</span>
                  <button onClick={() => setPicker(false)} className="text-mark font-semibold">Done</button>
                </div>
                <div className="px-5 py-3 border-b border-line">
                  <div className="flex gap-2 overflow-x-auto pb-1 -mx-5 px-5">
                    {Object.keys(EXERCISES).map(m => (
                      <button key={m} onClick={() => setMuscle(m)}
                        className={"shrink-0 px-3 py-1.5 rounded-full text-sm border " + (muscle === m ? "border-mark text-mark" : "border-line text-mut")}>{m}</button>
                    ))}
                  </div>
                </div>
                <div className="px-5 py-3 space-y-2 pb-12">
                  {EXERCISES[muscle].map(name => {
                    const added = f.ex.some(e => e.name === name);
                    return (
                      <button key={name} onClick={() => added ? removeExByName(name) : addEx(name)}
                        style={{ borderColor: added ? "#60A5FA" : "#1E2530", background: added ? "rgba(96,165,250,0.10)" : "transparent" }}
                        className="w-full flex items-center justify-between px-4 py-3 rounded-xl border text-left">
                        <span className="text-sm">{name}</span>
                        <span className="text-sm" style={{ color: added ? "#60A5FA" : "#727E90" }}>{added ? "✓ Added" : "+"}</span>
                      </button>
                    );
                  })}
                </div>
              </div>
            </div>
          )}
        </div>
      )}

      {active && <WorkoutMode workout={active} me={me} onClose={() => setActive(null)} />}
    </div>
  );
}

/* ---------- History ---------- */
function History({ me }) {
  const [items, setItems] = useState(null);
  useEffect(() => db.collection("workouts").where("done", "==", true).onSnapshot(
    s => setItems(s.docs.map(d => ({ id: d.id, ...d.data() }))),
    () => setItems("error")
  ), []);
  const done = (Array.isArray(items) ? items : []).slice().sort((a, b) => (b.date || "").localeCompare(a.date || ""));
  return (
    <div className="px-5">
      <SectionHead title="History" sub={done.length + " session" + (done.length === 1 ? "" : "s") + " logged"} />
      {items === null && <Loading />}
      {items === "error" && <Empty text="Can't reach the database. Publish the Firestore security rules, then refresh." />}
      {Array.isArray(items) && done.length === 0 && <Empty text="No completed workouts yet. Finish a session and it'll show up here." />}
      <div className="space-y-2">
        {done.map(it => (
          <div key={it.id} className="fade-in bg-panel border border-line rounded-2xl p-4">
            <div className="flex items-center justify-between">
              <span className="font-semibold">{it.title}</span>
              <span className="text-xs text-mut">{prettyDate(it.date)}</span>
            </div>
            <div className="mt-1">
              {it.doneBy
                ? <span className="text-[11px]" style={{ color: colorFor(it.doneBy) }}>Done by {nameFor(it.doneBy)}</span>
                : <Tag k={it.forWho} />}
            </div>
            {Array.isArray(it.exercises) && it.exercises.length > 0 && (
              <div className="mt-2 space-y-1">
                {it.exercises.map((e, i) => (
                  <div key={i} className="flex items-baseline gap-2 text-[13px]">
                    <span>{e.name}</span>
                    <span className="text-mut">{e.sets}×{e.reps}{e.weight ? " · " + e.weight : ""}</span>
                  </div>
                ))}
              </div>
            )}
          </div>
        ))}
      </div>
    </div>
  );
}

/* ---------- Chat ---------- */
function Chat({ me }) {
  const [msgs, setMsgs] = useState(null);
  const [text, setText] = useState("");
  const endRef = useRef(null);

  useEffect(() => db.collection("messages").orderBy("createdAt").onSnapshot(s =>
    setMsgs(s.docs.map(d => ({ id: d.id, ...d.data() })))), []);
  useEffect(() => { if (endRef.current) endRef.current.scrollIntoView({ behavior: "smooth" }); }, [msgs]);

  async function send() {
    const t = text.trim();
    if (!t) return;
    setText("");
    await db.collection("messages").add({ text: t, sender: me.key, createdAt: serverTime() });
  }

  return (
    <div className="flex flex-col" style={{ height: "calc(100vh - 130px)" }}>
      <div className="px-5 pt-1 pb-2"><SectionHead title="Chat" sub="Just you two" /></div>
      <div className="flex-1 overflow-y-auto px-5 space-y-2.5">
        {msgs === null && <Loading />}
        {msgs && msgs.length === 0 && <Empty text="No messages yet. Say something." />}
        {(msgs || []).map(m => {
          const mine = m.sender === me.key;
          const c = colorFor(m.sender);
          return (
            <div key={m.id} className={"flex fade-in " + (mine ? "justify-end" : "justify-start")}>
              <div className="max-w-[78%]">
                <div className={"px-3.5 py-2.5 rounded-2xl text-[15px] leading-snug " + (mine ? "rounded-br-md" : "rounded-bl-md")}
                  style={mine ? { background: c, color: "#080A0E" } : { background: "#141A24", border: "1px solid #1E2530" }}>
                  {m.text}
                </div>
                <div className={"text-[10px] text-mut mt-1 " + (mine ? "text-right" : "text-left")}>{clockOf(m.createdAt)}</div>
              </div>
            </div>
          );
        })}
        <div ref={endRef}></div>
      </div>
      <div className="px-4 pt-2 pb-3 border-t border-line flex gap-2 items-end bg-ink">
        <textarea value={text} onChange={e => setText(e.target.value)} rows="1" placeholder="Message"
          onKeyDown={e => { if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); send(); } }}
          className="flex-1 bg-panel border border-line rounded-2xl px-4 py-2.5 outline-none focus:border-mark resize-none max-h-28" />
        <button onClick={send} style={{ background: me.color }} className="w-11 h-11 rounded-full grid place-items-center text-ink text-lg font-bold shrink-0">↑</button>
      </div>
    </div>
  );
}

/* ---------- Goals ---------- */
function Goals({ me }) {
  const [items, setItems] = useState(null);
  const [open, setOpen] = useState(false);
  const [f, setF] = useState({ title: "", target: "", owner: "shared" });

  useEffect(() => db.collection("goals").orderBy("createdAt", "desc").onSnapshot(s =>
    setItems(s.docs.map(d => ({ id: d.id, ...d.data() })))), []);

  async function add() {
    if (!f.title.trim()) return;
    await db.collection("goals").add({ ...f, title: f.title.trim(), target: f.target.trim(), progress: 0, createdBy: me.key, createdAt: serverTime() });
    setF({ title: "", target: "", owner: "shared" });
    setOpen(false);
  }
  const bump = (it, n) => db.collection("goals").doc(it.id).update({ progress: Math.max(0, Math.min(100, (it.progress || 0) + n)) });
  const del = (id) => db.collection("goals").doc(id).delete();

  return (
    <div className="px-5">
      <SectionHead title="Goals" sub="What you're chasing" onAdd={() => setOpen(!open)} open={open} />
      {open && (
        <div className="fade-in bg-panel border border-line rounded-2xl p-4 mb-5 space-y-3">
          <input value={f.title} onChange={e => setF({ ...f, title: e.target.value })} placeholder="Goal (e.g. Squat 315)"
            className="w-full bg-panel2 border border-line rounded-xl px-3 py-2.5 outline-none focus:border-mark" />
          <input value={f.target} onChange={e => setF({ ...f, target: e.target.value })} placeholder="Target / by when (optional)"
            className="w-full bg-panel2 border border-line rounded-xl px-3 py-2.5 outline-none focus:border-mark text-sm" />
          <select value={f.owner} onChange={e => setF({ ...f, owner: e.target.value })}
            className="w-full bg-panel2 border border-line rounded-xl px-3 py-2.5 outline-none focus:border-mark text-sm">
            <option value="shared">Shared</option><option value="mark">Mark</option><option value="aubree">Aubree</option>
          </select>
          <button onClick={add} className="w-full py-2.5 rounded-xl bg-mark text-ink font-semibold">Add goal</button>
        </div>
      )}
      {items === null && <Loading />}
      {items && items.length === 0 && <Empty text="No goals set yet. Tap + to add one." />}
      <div className="space-y-3">
        {(items || []).map(it => {
          const c = it.owner === "shared" ? "#60A5FA" : colorFor(it.owner);
          const done = (it.progress || 0) >= 100;
          return (
            <div key={it.id} className="fade-in bg-panel border border-line rounded-2xl p-4">
              <div className="flex items-center gap-2">
                <span className={"font-semibold flex-1 " + (done ? "text-mark" : "")}>{it.title}</span>
                {it.owner === "shared"
                  ? <span className="text-[11px] px-2 py-0.5 rounded-full border border-line text-mut">Shared</span>
                  : <Tag k={it.owner} />}
                <button onClick={() => del(it.id)} className="text-mut text-lg leading-none px-1">×</button>
              </div>
              {it.target && <div className="text-sm text-mut mt-0.5">{it.target}</div>}
              <div className="mt-3 h-2 rounded-full bg-panel2 overflow-hidden">
                <div className="h-full rounded-full transition-all" style={{ width: (it.progress || 0) + "%", background: c }}></div>
              </div>
              <div className="flex items-center justify-between mt-2.5">
                <span className="text-sm font-medium" style={{ color: c }}>{it.progress || 0}%{done ? " · done" : ""}</span>
                <div className="flex gap-2">
                  <button onClick={() => bump(it, -10)} className="w-8 h-8 rounded-lg border border-line text-mut">−</button>
                  <button onClick={() => bump(it, 10)} className="w-8 h-8 rounded-lg border border-line text-txt">+</button>
                </div>
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

/* ---------- Food ---------- */
function Food({ me }) {

  const [open, setOpen] = useState(false);
  const [f, setF] = useState({ date: todayStr(), meal: "Breakfast", name: "", notes: "" });

  useEffect(() => db.collection("meals").orderBy("date", "desc").orderBy("createdAt", "desc").onSnapshot(
    s => setItems(s.docs.map(d => ({ id: d.id, ...d.data() }))),

  ), []);

  async function add() {
    if (!f.name.trim()) return;
    await db.collection("meals").add({ ...f, name: f.name.trim(), notes: f.notes.trim(), loggedBy: me.key, createdAt: serverTime() });
    setF({ date: todayStr(), meal: "Breakfast", name: "", notes: "" });
    setOpen(false);
  }

          <input value={f.name} onChange={e => setF({ ...f, name: e.target.value })} placeholder="What did you eat?"
            className="w-full bg-panel2 border border-line rounded-xl px-3 py-2.5 outline-none focus:border-mark" />
          <div className="flex gap-2">
            <input type="date" value={f.date} onChange={e => setF({ ...f, date: e.target.value })}
              className="flex-1 bg-panel2 border border-line rounded-xl px-3 py-2.5 outline-none focus:border-mark text-sm" />
            <select value={f.meal} onChange={e => setF({ ...f, meal: e.target.value })}
              className="bg-panel2 border border-line rounded-xl px-3 py-2.5 outline-none focus:border-mark text-sm">
              {["Breakfast", "Lunch", "Dinner", "Snack"].map(m => <option key={m}>{m}</option>)}

          <input value={f.notes} onChange={e => setF({ ...f, notes: e.target.value })} placeholder="Notes (optional)"

          <button onClick={add} className="w-full py-2.5 rounded-xl bg-mark text-ink font-semibold">Log it</button>
        </div>
      )}
      {items === null && <Loading />}
      {items && dates.length === 0 && <Empty text="Nothing logged yet. Tap + to add a meal." />}
      <div className="space-y-6">
        {dates.map(date => (
          <div key={date}>
            <div className="text-xs uppercase tracking-wider text-mut mb-2">{prettyDate(date)}</div>
            <div className="space-y-2">
              {groups[date].map(it => (
                <div key={it.id} className="fade-in bg-panel border border-line rounded-2xl p-4 flex items-start gap-3">
                  <div className="flex-1 min-w-0">
                    <div className="flex items-center gap-2">
                      <span className="font-semibold">{it.name}</span>
                      <span className="text-[11px] px-2 py-0.5 rounded-full border border-line text-mut">{it.meal}</span>
                    </div>
                    {it.notes && <div className="text-sm text-mut mt-1">{it.notes}</div>}
                    <div className="text-[11px] mt-1.5" style={{ color: colorFor(it.loggedBy) }}>Logged by {nameFor(it.loggedBy)}</div>
                  </div>
                  <button onClick={() => del(it.id)} className="text-mut text-lg leading-none px-1">×</button>
                </div>
              ))}
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

/* ---------- Shared bits ---------- */
function SectionHead({ title, sub, onAdd, open }) {
  return (
    <div className="flex items-end justify-between mb-4">
      <div>
        <h1 className="wordmark text-3xl font-semibold leading-none">{title}</h1>
        {sub && <div className="text-mut text-sm mt-1">{sub}</div>}
      </div>
      {onAdd && (
        <button onClick={onAdd} style={{ background: open ? "transparent" : "#60A5FA", color: open ? "#727E90" : "#080A0E" }}
          className={"w-9 h-9 rounded-full grid place-items-center text-xl font-bold " + (open ? "border border-line" : "glow")}>
          {open ? "×" : "+"}
        </button>
      )}
    </div>
  );
}
function Loading() { return <div className="text-center text-mut text-sm py-10">Loading…</div>; }
function Empty({ text }) { return <div className="text-center text-mut text-sm py-12 px-6 leading-relaxed">{text}</div>; }

/* ---------- Shell ---------- */
const TABS = [
  { k: "schedule", label: "Schedule", icon: "▦" },
  { k: "history", label: "History", icon: "≣" },
  { k: "chat", label: "Chat", icon: "✦" },
  { k: "goals", label: "Goals", icon: "◎" },
  { k: "food", label: "Food", icon: "❍" },
];

function Shell({ user }) {
  const me = person(user.email);
  const [tab, setTab] = useState("schedule");
  const other = me.key === "mark" ? "aubree" : "mark";

  return (
    <div className="max-w-md mx-auto min-h-screen flex flex-col">
      <header className="top-pad px-5 pt-3 pb-3 flex items-center justify-between sticky top-0 z-20 bg-ink/90 backdrop-blur border-b border-line">
        <div className="flex items-center gap-2.5">
          <div className="flex -space-x-2">
            <Avatar k={me.key} ring />
            <Avatar k={other} />
          </div>
          <div className="leading-tight">
            <div className="wordmark text-lg font-semibold">FORGE</div>
            <div className="flex items-center gap-1.5 text-[11px] text-mut">
              <span className="w-1.5 h-1.5 rounded-full bg-emerald-400 pulse-dot"></span> Live · {me.name}
            </div>
          </div>
        </div>
        <button onClick={() => auth.signOut()} className="text-xs text-mut border border-line rounded-lg px-3 py-1.5">Log out</button>
      </header>

      <main className="flex-1 pt-4 nav-pad">
        {tab === "schedule" && <Schedule me={me} />}
        {tab === "history" && <History me={me} />}
        {tab === "chat" && <Chat me={me} />}
        {tab === "goals" && <Goals me={me} />}
        {tab === "food" && <Food me={me} />}
      </main>

      <nav className="fixed bottom-0 left-0 right-0 z-20 safe-bottom border-t border-line bg-ink/95 backdrop-blur">
        <div className="max-w-md mx-auto flex">
          {TABS.map(t => {
            const on = tab === t.k;
            return (
              <button key={t.k} onClick={() => setTab(t.k)} className="flex-1 py-3 flex flex-col items-center gap-1">
                <span className="text-lg leading-none" style={{ color: on ? me.color : "#727E90" }}>{t.icon}</span>
                <span className="text-[10px] font-medium" style={{ color: on ? me.color : "#727E90" }}>{t.label}</span>
              </button>
            );
          })}
        </div>
      </nav>
    </div>
  );
}

/* ---------- Root ---------- */
function App() {
  const [user, setUser] = useState(undefined);
  useEffect(() => auth.onAuthStateChanged(u => setUser(u)), []);
  if (user === undefined) return <div className="min-h-screen grid place-items-center text-mut">Loading…</div>;
  if (!user) return <Login />;
  return <Shell user={user} />;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>

<script>
  window.addEventListener('load', function () {
    setTimeout(function () {
      var root = document.getElementById('root');
      if (root && root.childNodes.length === 0 && !document.getElementById('boot-error')) {
        var miss = [];
        if (typeof React === 'undefined') miss.push('React');
        if (typeof ReactDOM === 'undefined') miss.push('ReactDOM');
        if (typeof Babel === 'undefined') miss.push('Babel');
        if (typeof firebase === 'undefined') miss.push('Firebase');
        if (miss.length) window.__bootErr('These libraries did NOT load: ' + miss.join(', ') + '.\nA script URL was blocked or failed to download.');
        else window.__bootErr('All libraries loaded, but the app did not render.\nThere is a JavaScript error during startup.');
      }
    }, 2500);
  });
</script>
</body>
</html>
